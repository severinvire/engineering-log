baseURL = "https://severinvire.github.io/engineering-log/"
title = "Engineering Log"
theme = "PaperMod"
math = true

[params]
  defaultTheme = "light"
  disableThemeToggle = false
  hideFooter = false
  ShowReadingTime = false
  ShowWordCount = false
  comments = false
  customcss = ["css/custom.css"]
  [params.math]
    enable = true

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About Me"
    url = "/about"
    weight = 10

[privacy]
  disallow = ["twitter", "youtube", "vimeo", "instagram", "disqus", "googleanalytics"]